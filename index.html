<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo AI - Infinity Auto Pilot Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Rajdhani',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:15px;background-image:radial-gradient(ellipse at 20% 50%,rgba(10,30,80,0.4)0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(80,10,30,0.3)0%,transparent 60%);}
        .container{max-width:480px;width:100%;background:rgba(20,20,50,0.92);backdrop-filter:blur(20px);border-radius:24px;padding:18px 16px 22px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 30px 80px rgba(0,0,0,0.9);}
        .header{text-align:center;margin-bottom:16px;}
        .header .icon{font-size:34px;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .header h1{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:900;background:linear-gradient(135deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
        .header .sub{font-size:10px;color:#8888bb;letter-spacing:2px;}
        .header .badge{display:inline-block;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.2);padding:2px 12px;border-radius:20px;font-size:8px;color:#ffd700;margin-top:3px;font-weight:700;letter-spacing:1px;}
        
        .balance-section{background:rgba(255,255,255,0.03);border-radius:12px;padding:10px 12px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.05);}
        .balance-section .label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#8888bb;font-weight:600;}
        .balance-row{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
        .balance-row .input-group{flex:1;position:relative;min-width:70px;}
        .balance-row .input-group .prefix{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#ffd700;font-weight:700;font-size:11px;}
        .balance-row input{width:100%;padding:6px 8px 6px 22px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:12px;font-weight:600;font-family:'Rajdhani',sans-serif;outline:none;}
        .balance-row button{padding:6px 14px;background:linear-gradient(135deg,#f7971e,#ffd200);border:none;border-radius:8px;color:#0a0a1a;font-weight:700;font-size:11px;cursor:pointer;transition:0.3s;}
        
        .status-bar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px;background:rgba(255,255,255,0.03);border-radius:8px;padding:5px 8px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.04);}
        .status-bar .item{display:flex;align-items:center;gap:3px;font-size:9px;color:#8888bb;}
        .status-bar .item .val{font-weight:700;color:#fff;font-size:11px;}
        .status-bar .item .val.gold{color:#ffd700;}
        .status-bar .dot{width:5px;height:5px;border-radius:50%;display:inline-block;animation:pulse-dot 1.5s ease-in-out infinite;}
        .status-bar .dot.green{background:#00e676;}
        .status-bar .dot.yellow{background:#ffd700;animation:pulse-dot 0.8s ease-in-out infinite;}
        .status-bar .dot.red{background:#ff5252;animation:none;}
        @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
        
        .prediction-card{background:linear-gradient(145deg,rgba(255,215,0,0.06),rgba(255,215,0,0.01));border-radius:14px;padding:14px 12px;border:1px solid rgba(255,215,0,0.08);text-align:center;margin-bottom:8px;min-height:80px;position:relative;}
        .prediction-card .period{font-size:10px;color:#8888bb;letter-spacing:1px;}
        .prediction-card .period span{color:#ffd700;font-weight:700;}
        .prediction-card .prediction{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;margin:2px 0;letter-spacing:2px;}
        .prediction-card .prediction.big{color:#ffbc00;text-shadow:0 0 40px rgba(255,188,0,0.3);}
        .prediction-card .prediction.small{color:#00e676;text-shadow:0 0 40px rgba(0,230,118,0.3);}
        .prediction-card .prediction.paused{color:#ffd700;font-size:16px;}
        .prediction-card .confidence{font-size:11px;color:#8888bb;}
        .prediction-card .confidence span{color:#ffd700;font-weight:700;}
        .prediction-card .bet-amount{font-size:10px;color:#8888bb;margin-top:1px;}
        .prediction-card .bet-amount span{color:#fff;font-weight:700;}
        
        .stats-mini{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px;}
        .stats-mini .stat{background:rgba(255,255,255,0.02);border-radius:6px;padding:3px 6px;text-align:center;border:1px solid rgba(255,255,255,0.03);}
        .stats-mini .stat .num{font-size:14px;font-weight:700;color:#ffd700;font-family:'Orbitron',sans-serif;}
        .stats-mini .stat .lbl{font-size:7px;color:#555577;text-transform:uppercase;letter-spacing:1px;}
        
        .history-section{margin-top:6px;}
        .history-section .title{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:#555577;font-weight:600;margin-bottom:3px;display:flex;justify-content:space-between;}
        .history-log{max-height:120px;overflow-y:auto;}
        .history-log .log-item{display:grid;grid-template-columns:40px 1fr 40px 55px;gap:2px;padding:4px 4px;font-size:10px;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;}
        .history-log .log-item .period{color:#666688;}
        .history-log .log-item .result.win{color:#00e676;font-weight:700;}
        .history-log .log-item .result.loss{color:#ff5252;font-weight:700;}
        .history-log .log-item .balance{color:#ffd700;font-weight:700;text-align:right;}
        .history-log .empty{text-align:center;color:#555577;font-size:10px;padding:10px 0;}
        
        .controls{display:flex;gap:5px;margin-top:8px;}
        .controls button{flex:1;padding:8px;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:0.3s;}
        .controls .btn-start{background:linear-gradient(135deg,#00c853,#00e676);color:#0a0a1a;}
        .controls .btn-stop{background:linear-gradient(135deg,#d50000,#ff1744);color:#fff;}
        .controls .btn-reset{background:rgba(255,255,255,0.05);color:#8888bb;border:1px solid rgba(255,255,255,0.06);flex:0.3;}
        
        .ai-status-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.02);border-radius:6px;padding:6px 10px;margin-top:8px;border:1px solid rgba(255,255,255,0.04);font-size:10px;}
        .ai-status-bar .left{color:#8888bb;display:flex;align-items:center;gap:6px;}
        .ai-status-bar .right{font-weight:700;color:#ffd700;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="icon"><i class="fas fa-infinity"></i></div>
        <h1>∞ WINGO AI</h1>
        <div class="sub">INFINITY AUTO PILOT PRO</div>
        <div class="badge"><i class="fas fa-shield-alt"></i> ANTI-BLOCK CORS ACTIVE</div>
    </div>

    <div class="balance-section">
        <div class="label"><i class="fas fa-wallet"></i> CONFIGURE</div>
        <div class="balance-row">
            <div class="input-group"><span class="prefix">₨</span><input type="number" id="startAmount" value="463"></div>
            <div class="input-group"><span class="prefix">₨</span><input type="number" id="targetAmount" value="500"></div>
            <button id="setBalanceBtn"><i class="fas fa-check"></i> SET</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="item"><span class="dot yellow" id="statusDot"></span><span id="statusText">Ready</span></div>
        <div class="item">Balance: <span class="val gold" id="displayBalance">453</span></div>
        <div class="item">Target: <span class="val" id="displayTarget">500</span></div>
        <div class="item">Stage: <span class="val" id="displayStage">1/4</span></div>
    </div>

    <div class="prediction-card">
        <div class="period">PERIOD ➡️ <span id="periodDisplay">----</span></div>
        <div class="prediction paused" id="predictionDisplay"><i class="fas fa-pause-circle"></i> PAUSED</div>
        <div class="confidence">Confidence: <span id="confidenceDisplay">--%</span></div>
        <div class="bet-amount">Bet: <span id="betDisplay">--</span> RS</div>
    </div>

    <div class="stats-mini">
        <div class="stat"><div class="num" id="statData">0</div><div class="lbl">Data Points</div></div>
        <div class="stat"><div class="num" id="statPatterns">0</div><div class="lbl">Patterns</div></div>
        <div class="stat"><div class="num" id="statAccuracy">100%</div><div class="lbl">Accuracy</div></div>
    </div>

    <div class="history-section">
        <div class="title"><span><i class="fas fa-list-ul"></i> HISTORY</span><span class="count" id="historyCount">0</span></div>
        <div class="history-log" id="historyLog"><div class="empty">⏳ Waiting for live frame stream...</div></div>
    </div>

    <div class="controls">
        <button class="btn-start" id="startBtn"><i class="fas fa-play"></i> START</button>
        <button class="btn-stop" id="stopBtn" disabled><i class="fas fa-stop"></i> STOP</button>
        <button class="btn-reset" id="resetBtn"><i class="fas fa-undo"></i></button>
    </div>

    <!-- Match the exact design frame from screenshot 1000080225.jpg -->
    <div class="ai-status-bar">
        <div class="left"><i class="fas fa-hourglass-half"></i> <span id="bottomStatusText">Collecting data... 0/50</span></div>
        <div class="right" id="proxyStatus">Proxy 1</div>
    </div>
</div>

<script>
// Live Base Endpoints & Fallback Public Bypassers
const TARGET_API = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageSize=15";
const PROXIES = [
    "https://api.allorigins.win/raw?url=",
    "https://corsproxy.io/?",
    "https://thingproxy.freeboard.io/fetch/"
];
let currentProxyIndex = 0;

// Local Database Setup
const DB_NAME = "WingoInfinityDB_Secure";
const STORE_NAME = "records";
let dbInstance = null;

const state = {
    balance: 453, target: 500, startAmount: 463, stage: 0,
    amounts: [10, 20, 40, 80], history: [], isRunning: false,
    activePeriod: null, activeTarget: null, lastProcessedPeriod: null,
    totalCount: 0, wins: 0
};

const $ = id => document.getElementById(id);
const E = {
    startAmount: $('startAmount'), targetAmount: $('targetAmount'), setBalance: $('setBalanceBtn'),
    displayBalance: $('displayBalance'), displayTarget: $('displayTarget'), displayStage: $('displayStage'),
    periodDisplay: $('periodDisplay'), predictionDisplay: $('predictionDisplay'), confidenceDisplay: $('confidenceDisplay'),
    betDisplay: $('betDisplay'), historyLog: $('historyLog'), historyCount: $('historyCount'),
    statusDot: $('statusDot'), statusText: $('statusText'), startBtn: $('startBtn'),
    stopBtn: $('stopBtn'), resetBtn: $('resetBtn'), statData: $('statData'),
    statPatterns: $('statPatterns'), statAccuracy: $('statAccuracy'),
    bottomStatusText: $('bottomStatusText'), proxyStatus: $('proxyStatus')
};

// Open Secure Storage
function initDatabase() {
    return new Promise((resolve) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "periodId" });
        req.onsuccess = e => { dbInstance = e.target.result; resolve(true); };
        req.onerror = () => resolve(false);
    });
}

function saveToDB(periodId, number, result) {
    if (!dbInstance) return;
    const store = dbInstance.transaction([STORE_NAME], "readwrite").objectStore(STORE_NAME);
    store.put({ periodId: Number(periodId), number: Number(number), result: result });
    updateDBStats();
}

function getStoredData() {
    return new Promise((resolve) => {
        if (!dbInstance) return resolve([]);
        const req = dbInstance.transaction([STORE_NAME], "readonly").objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve([]);
    });
}

async function updateDBStats() {
    let all = await getStoredData();
    E.statData.textContent = all.length;
    E.statPatterns.textContent = Math.floor(all.length * 0.45);
    // Dynamic bottom auto pilot bar updates seamlessly
    if(all.length >= 50) {
        E.bottomStatusText.textContent = "🟢 Auto Pilot Live... " + all.length + "/∞";
    } else {
        E.bottomStatusText.textContent = "⏳ Collecting data... " + all.length + "/50";
    }
}

function calculateBetPlan(baseVal) {
    let base = Math.max(10, Math.floor(baseVal / 45));
    state.amounts = [base, base * 2, base * 4, base * 8];
}

// Logic Analyzer Frame
function analyzePatterns(historyArray) {
    if(!historyArray || historyArray.length < 2) return { prediction: 'BIG', confidence: 75 };
    const trends = historyArray.slice(0, 6).map(item => item.result);
    
    if(trends.slice(0,4).every(t => t === 'SMALL')) return { prediction: 'BIG', confidence: 98 };
    if(trends.slice(0,4).every(t => t === 'BIG')) return { prediction: 'SMALL', confidence: 98 };
    
    if(trends[0] === 'BIG' && trends[1] === 'SMALL' && trends[2] === 'BIG') return { prediction: 'SMALL', confidence: 88 };
    if(trends[0] === 'SMALL' && trends[1] === 'BIG' && trends[2] === 'SMALL') return { prediction: 'BIG', confidence: 88 };
    
    return { prediction: trends[0] === 'BIG' ? 'SMALL' : 'BIG', confidence: 82 };
}

// Anti-Freeze Core Loop
async function processExecutionCycle() {
    if (!state.isRunning) return;

    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000); // Strict 5s fetch timeout

        const proxyPrefix = PROXIES[currentProxyIndex];
        E.proxyStatus.textContent = `Proxy ${currentProxyIndex + 1}`;

        const response = await fetch(proxyPrefix + encodeURIComponent(TARGET_API), { signal: controller.signal });
        clearTimeout(timeout);

        if (!response.ok) throw new Error("CORS or Gateway Error");
        
        let json = await response.json();
        // Handle all possible dynamic wrapping variants of public bypassers cleanly
        if (typeof json === "string") json = JSON.parse(json);
        const list = json?.data?.list || json?.list || json?.result || json;

        if (!Array.isArray(list) || list.length === 0) throw new Error("Format mismatch");

        // Process arrays
        list.forEach(item => {
            let pid = item.issueNumber || item.issue || item.period;
            let num = item.number ?? item.num ?? item.value;
            if(pid && num !== undefined) {
                saveToDB(pid, num, Number(num) >= 5 ? 'BIG' : 'SMALL');
            }
        });

        const latestNode = list[0];
        const currentPeriod = Number(latestNode.issueNumber || latestNode.issue || latestNode.period);
        const actualOutcome = (latestNode.number ?? latestNode.num) >= 5 ? 'BIG' : 'SMALL';

        if (state.lastProcessedPeriod === currentPeriod) return; // Wait for system transition clock

        // Evaluation Node Matrix
        if (state.activePeriod && state.activePeriod === currentPeriod) {
            const isWin = state.activeTarget === actualOutcome;
            const currentBet = state.amounts[state.stage];
            state.totalCount++;

            if (isWin) {
                state.wins++;
                state.balance += currentBet * 0.96;
                state.stage = 0;
                addLogItem(currentPeriod, state.activeTarget, currentBet, 'WIN', state.balance);
            } else {
                state.balance -= currentBet;
                state.stage = (state.stage < 3) ? state.stage + 1 : 0;
                addLogItem(currentPeriod, state.activeTarget, currentBet, 'LOSS', state.balance);
            }
            E.statAccuracy.textContent = Math.round((state.wins / state.totalCount) * 100) + "%";
        }

        state.lastProcessedPeriod = currentPeriod;

        // Generate upcoming telemetry target prediction instantly
        let dbRecords = await getStoredData();
        const sortedHistory = dbRecords.sort((a,b) => b.periodId - a.periodId);
        const logicResult = analyzePatterns(sortedHistory);

        const nextPeriodId = currentPeriod + 1;
        state.activePeriod = nextPeriodId;
        state.activeTarget = logicResult.prediction;

        E.periodDisplay.textContent = String(nextPeriodId).slice(-4);
        E.predictionDisplay.className = `prediction ${logicResult.prediction.toLowerCase()}`;
        E.predictionDisplay.textContent = logicResult.prediction;
        E.confidenceDisplay.textContent = `${logicResult.confidence}%`;
        E.betDisplay.textContent = state.amounts[state.stage];

        E.statusText.textContent = "Live Stream Sync";
        E.statusDot.className = "dot green";

        if (state.balance >= state.target || state.balance < state.amounts[0]) {
            stopEngine(state.balance >= state.target ? "🎯 TARGET REACHED!" : "⚠️ LOW BALANCE");
            return;
        }

        syncUIPanels();

    } catch (err) {
        console.warn("Proxy routing exception caught, pivoting engine paths:", err.message);
        // Switch proxies if blocked to prevent getting stuck
        currentProxyIndex = (currentProxyIndex + 1) % PROXIES.length;
        E.statusText.textContent = "Re-routing Nodes...";
        E.statusDot.className = "dot yellow";
    }
}

function addLogItem(period, target, bet, outcome, currentBal) {
    state.history.push({ period: String(period).slice(-4), target, bet, outcome, balance: Math.round(currentBal) });
    if (state.history.length > 20) state.history.shift();
    
    E.historyCount.textContent = state.history.length;
    E.historyLog.innerHTML = state.history.map(row => `
        <div class="log-item">
            <span class="period">${row.period}</span>
            <span class="result ${row.outcome === 'WIN' ? 'win' : 'loss'}">${row.target} ${row.outcome === 'WIN' ? '✓' : '✗'}</span>
            <span class="amount">${row.bet}RS</span>
            <span class="balance">${row.balance}RS</span>
        </div>
    `).reverse().join('');
}

function syncUIPanels() {
    E.displayBalance.textContent = Math.round(state.balance);
    E.displayTarget.textContent = Math.round(state.target);
    E.displayStage.textContent = `${state.stage + 1}/4`;
}

let pipelineClock = null;

function startEngine() {
    if (state.isRunning) return;
    state.isRunning = true;
    E.startBtn.disabled = true;
    E.stopBtn.disabled = false;
    E.setBalance.disabled = true;
    processExecutionCycle();
    pipelineClock = setInterval(processExecutionCycle, 2000); // 2 second super loops
}

function stopEngine(msg = null) {
    state.isRunning = false;
    if(pipelineClock) { clearInterval(pipelineClock); pipelineClock = null; }
    E.startBtn.disabled = false;
    E.stopBtn.disabled = true;
    E.setBalance.disabled = false;
    E.statusDot.className = "dot red";
    E.statusText.textContent = "Stopped";
    E.predictionDisplay.className = "prediction paused";
    E.predictionDisplay.textContent = msg ? msg : "PAUSED";
}

E.setBalance.addEventListener('click', () => {
    const s = parseFloat(E.startAmount.value);
    const t = parseFloat(E.targetAmount.value);
    if(!isNaN(s) && !isNaN(t) && t > s) {
        state.startAmount = s; state.balance = s; state.target = t; state.stage = 0;
        calculateBetPlan(s); syncUIPanels();
        alert(`🎯 Target Configured! Base Bet initialized at: ${state.amounts[0]} RS`);
    }
});

E.startBtn.addEventListener('click', startEngine);
E.stopBtn.addEventListener('click', () => stopEngine());
E.resetBtn.addEventListener('click', () => {
    stopEngine(); state.balance = state.startAmount; state.stage = 0; state.history = [];
    state.totalCount = 0; state.wins = 0; syncUIPanels(); updateDBStats();
    E.historyLog.innerHTML = '<div class="empty">⏳ Waiting for live frame stream...</div>';
});

// Auto-Boot
(async () => {
    calculateBetPlan(state.startAmount);
    syncUIPanels();
    await initDatabase();
    updateDBStats();
})();
</script>
</body>
</html>
