<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINGO AI PREMIUM CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #05070F; 
        }
        .glass-panel { 
            background: linear-gradient(135deg, rgba(19, 26, 47, 0.6) 0%, rgba(11, 15, 28, 0.75) 100%);
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
        }
        .glow-active { box-shadow: 0 0 30px rgba(34, 211, 238, 0.06); }
        .row-animate { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-start p-4 md:p-8 relative overflow-x-hidden selection:bg-cyan-500/30">

    <div class="absolute top-[-5%] left-[-10%] w-[400px] h-[400px] bg-blue-500/5 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[5%] right-[-10%] w-[400px] h-[400px] bg-cyan-500/5 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-xl z-10 mx-auto mt-2">
        
        <div class="flex flex-col items-center mb-6 text-center">
            <div class="inline-flex items-center gap-2 bg-cyan-950/40 border border-cyan-500/20 px-3.5 py-1 rounded-full text-cyan-400 font-bold text-[10px] tracking-widest uppercase mb-4">
                <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span> LIVE MATRIX FEED
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-white uppercase">
                WINGO AUTOMATED MONITOR
            </h1>
            <p class="text-slate-500 text-xs mt-1 tracking-wide">Clean Intelligent Sequence Tracker</p>
        </div>

        <div class="glass-panel rounded-2xl p-6 mb-6 relative overflow-hidden glow-active">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-cyan-400 via-sky-500 to-blue-500"></div>
            
            <div class="flex flex-col gap-6">
                <div class="grid grid-cols-2 border-b border-slate-800/50 pb-4 items-center">
                    <div>
                        <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase block">ACTIVE BLOCK</span>
                        <div id="live-period" class="text-xl font-extrabold text-white tracking-wide mt-0.5">🔄 Syncing...</div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase block">TIME CLOCK</span>
                        <div id="live-timer" class="text-xl font-black text-rose-400 tracking-wider font-mono mt-0.5">00s</div>
                    </div>
                </div>
                
                <div class="text-center py-2 relative">
                    <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase block">PREMIUM TARGET</span>
                    <div id="live-target" class="text-5xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-300 my-2">-</div>
                    
                    <div class="inline-flex items-center bg-slate-950/60 rounded-lg px-3 py-1.5 border border-slate-800/40">
                        <div id="live-multiplier" class="text-[11px] text-slate-400 font-bold tracking-wide uppercase">MULT: Fetching Data...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-3 flex items-center justify-between px-1">
            <h2 class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">RECENT RECORD ANALYSIS</h2>
            <button onclick="clearSystemCache()" class="text-[9px] text-rose-400/60 hover:text-rose-400 uppercase tracking-widest font-bold transition-all">Clear Logs</button>
        </div>

        <div id="history-deck" class="space-y-2.5">
            <div class="text-center py-10 text-slate-600 text-xs border border-dashed border-slate-800/60 rounded-xl uppercase tracking-widest">
                Establishing live pipeline link...
            </div>
        </div>

        <div class="mt-10 text-center text-[10px] text-slate-600 tracking-widest uppercase">
            SECURE REAL-TIME DATA STREAM INTERFACE
        </div>
    </div>

    <script>
        const GAME_API = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageSize=10";
        
        const AMOUNTS = [10, 20, 40, 80, 160, 320];
        const MULTIPLIERS = ["1x", "2x", "4x", "8x", "16x", "32x"];
        
        let currentIndex = parseInt(localStorage.getItem('wingo_curr_idx')) || 0;
        let matrixHistory = JSON.parse(localStorage.getItem('wingo_matrix_hist')) || [];
        let activePrediction = JSON.parse(localStorage.getItem('wingo_active_pred')) || null;

        function runMultiPatternAnalyzer(list) {
            try {
                let types = list.map(r => parseInt(r.number) >= 5 ? "BIG" : "SMALL");
                if (types[0] === types[1] && types[1] === types[2]) return types[0];
                if (types[0] !== types[1] && types[1] !== types[2] && types[2] !== types[3]) {
                    return types[0] === "BIG" ? "SMALL" : "BIG";
                }
                let bigCount = types.slice(0, 5).filter(t => t === "BIG").length;
                return bigCount >= 3 ? "SMALL" : "BIG";
            } catch (e) {
                return "BIG";
            }
        }

        function formatPeriod(periodVal) {
            const str = String(periodVal);
            return str.length > 4 ? str.slice(-4) : str.padStart(4, '0');
        }

        function renderInterface() {
            if (!activePrediction) return;

            // Render current live prediction card parameters
            document.getElementById('live-period').innerText = `*${formatPeriod(activePrediction.period)}`;
            document.getElementById('live-target').innerText = activePrediction.target;
            
            const targetEl = document.getElementById('live-target');
            if(activePrediction.target === "BIG") {
                targetEl.className = "text-5xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-sky-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.2)] my-2";
            } else {
                targetEl.className = "text-5xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-pink-500 drop-shadow-[0_0_15px_rgba(232,121,249,0.2)] my-2";
            }

            document.getElementById('live-multiplier').innerText = `${activePrediction.multiplier} (${activePrediction.amount} RS)`;

            // Render history cards perfectly matching the verified array items
            const deck = document.getElementById('history-deck');
            deck.innerHTML = '';

            if (matrixHistory.length === 0) {
                deck.innerHTML = `<div class="text-center py-8 text-slate-600 text-[11px] border border-dashed border-slate-800/80 rounded-xl uppercase tracking-widest">[ No past rounds verified in this session ]</div>`;
                return;
            }

            // Always pick up to the latest 5 unique concluded items
            const itemsToShow = matrixHistory.slice(-5).reverse();
            itemsToShow.forEach(row => {
                const isWin = row.result === "WIN";
                const badgeTheme = isWin 
                    ? 'text-emerald-400 bg-emerald-500/5 border-emerald-500/20' 
                    : 'text-rose-400 bg-rose-500/5 border-rose-500/20';
                
                const indicatorSideBorder = isWin ? 'border-l-emerald-500/80' : 'border-l-rose-500/80';

                deck.innerHTML += `
                    <div class="glass-panel rounded-xl p-3.5 flex items-center justify-between border-l-2 ${indicatorSideBorder} row-animate">
                        <div class="flex items-center gap-5">
                            <span class="text-xs font-semibold text-slate-500 font-mono">ID: *${formatPeriod(row.period)}</span>
                            <span class="text-sm font-extrabold text-white tracking-wide">【${row.target}】</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-bold text-slate-400 font-mono">₹${row.amount}</span>
                            <div class="w-16 border text-center py-1 text-[9px] font-black tracking-widest rounded-md uppercase ${badgeTheme}">
                                ${row.result}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function synchronizedFetchEngine() {
            try {
                const response = await fetch(GAME_API, { method: 'GET' });
                const json = await response.json();
                const latestRecord = json.data.list[0];
                const completedPeriod = parseInt(latestRecord.issueNumber);
                const liveActivePeriod = completedPeriod + 1;

                // Step 1: Check if previous prediction is now officially closed on server
                if (activePrediction && activePrediction.period < liveActivePeriod) {
                    // Make sure we never push duplicate items to the history ledger
                    const alreadyEvaluated = matrixHistory.some(row => parseInt(row.period) === activePrediction.period);
                    
                    if (!alreadyEvaluated) {
                        const matchedItem = json.data.list.find(item => parseInt(item.issueNumber) === activePrediction.period);
                        if (matchedItem) {
                            const actualResult = parseInt(matchedItem.number) >= 5 ? "BIG" : "SMALL";
                            const isWin = activePrediction.target === actualResult;

                            matrixHistory.push({
                                period: activePrediction.period, 
                                target: activePrediction.target,
                                amount: activePrediction.amount,
                                result: isWin ? "WIN" : "LOSE"
                            });

                            currentIndex = isWin ? 0 : Math.min(currentIndex + 1, AMOUNTS.length - 1);
                            
                            localStorage.setItem('wingo_curr_idx', currentIndex);
                            localStorage.setItem('wingo_matrix_hist', JSON.stringify(matrixHistory));
                        }
                    }
                    activePrediction = null;
                }

                // Step 2: Force live active block synchronization to prevent any visual delay or stuck states
                if (!activePrediction || activePrediction.period !== liveActivePeriod) {
                    const predictedTarget = runMultiPatternAnalyzer(json.data.list);

                    activePrediction = {
                        period: liveActivePeriod,
                        target: predictedTarget,
                        amount: AMOUNTS[currentIndex],
                        multiplier: MULTIPLIERS[currentIndex]
                    };

                    localStorage.setItem('wingo_active_pred', JSON.stringify(activePrediction));
                }

                renderInterface();
            } catch (error) {
                console.log("Network pipeline update skip, retrying...", error);
            }
        }

        function clearSystemCache() {
            if (confirm("Reset current monitoring stats ledger?")) {
                localStorage.clear();
                currentIndex = 0;
                matrixHistory = [];
                activePrediction = null;
                synchronizedFetchEngine();
            }
        }

        // Clock cycle sync settings
        setInterval(() => {
            const currentSeconds = new Date().getSeconds();
            const remainingSeconds = 60 - currentSeconds;
            document.getElementById('live-timer').innerText = (remainingSeconds < 10 ? "0" : "") + remainingSeconds + "s";

            // Safe checkpoint polling to catch state switches quickly
            if (remainingSeconds === 58 || remainingSeconds === 30 || remainingSeconds === 15) {
                synchronizedFetchEngine();
            }
        }, 1000);

        // Immediate first boot activation
        synchronizedFetchEngine();
    </script>
</body>
</html>
