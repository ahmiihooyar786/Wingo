<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Self-Learning Bot - PreFetch Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(10,30,80,0.4) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 50%, rgba(80,10,30,0.3) 0%, transparent 60%);
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(20,20,50,0.88);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 18px 24px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }
        .header { text-align: center; margin-bottom: 18px; }
        .header .icon { font-size: 32px; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 900; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .sub { font-size: 10px; color: #8888bb; letter-spacing: 2px; }
        .header .badge { display: inline-block; background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.2); padding: 2px 12px; border-radius: 20px; font-size: 9px; color: #ffd700; margin-top: 3px; font-weight: 600; }

        .balance-section { background: rgba(255,255,255,0.03); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .balance-section .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #8888bb; font-weight: 600; }
        .balance-row { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
        .balance-row .input-group { flex: 1; position: relative; min-width: 80px; }
        .balance-row .input-group .prefix { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #ffd700; font-weight: 700; font-size: 12px; }
        .balance-row input { width: 100%; padding: 8px 10px 8px 26px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; font-family: 'Rajdhani', sans-serif; outline: none; }
        .balance-row input:focus { border-color: #ffd700; }
        .balance-row button { padding: 8px 16px; background: linear-gradient(135deg, #f7971e, #ffd200); border: none; border-radius: 8px; color: #0a0a1a; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .balance-row button:hover { transform: scale(1.03); }

        .status-bar { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); border-radius: 8px; padding: 6px 10px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.04); flex-wrap: wrap; gap: 3px; }
        .status-bar .item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #8888bb; }
        .status-bar .item .val { font-weight: 700; color: #fff; font-size: 12px; }
        .status-bar .item .val.gold { color: #ffd700; }
        .status-bar .item .val.green { color: #00e676; }
        .status-bar .item .val.red { color: #ff5252; }
        .status-bar .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; animation: pulse-dot 1.5s ease-in-out infinite; }
        .status-bar .dot.green { background: #00e676; }
        .status-bar .dot.red { background: #ff5252; animation: none; }
        .status-bar .dot.yellow { background: #ffd700; animation: pulse-dot 0.8s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

        .prediction-card { background: linear-gradient(145deg, rgba(255,215,0,0.06), rgba(255,215,0,0.01)); border-radius: 14px; padding: 16px 14px; border: 1px solid rgba(255,215,0,0.08); text-align: center; margin-bottom: 10px; min-height: 90px; position: relative; overflow: hidden; }
        .prediction-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.03), transparent 70%); animation: rotate-glow 20s linear infinite; pointer-events: none; }
        @keyframes rotate-glow { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .prediction-card .period { font-size: 11px; color: #8888bb; letter-spacing: 1px; position: relative; z-index: 1; }
        .prediction-card .period span { color: #ffd700; font-weight: 700; }
        .prediction-card .prediction { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; margin: 3px 0; position: relative; z-index: 1; letter-spacing: 2px; }
        .prediction-card .prediction.big { color: #ff5252; text-shadow: 0 0 40px rgba(255,82,82,0.3); }
        .prediction-card .prediction.small { color: #00e676; text-shadow: 0 0 40px rgba(0,230,118,0.3); }
        .prediction-card .prediction.waiting { color: #8888bb; font-size: 16px; }
        .prediction-card .prediction.paused { color: #ffd700; font-size: 18px; }
        .prediction-card .confidence { font-size: 12px; color: #8888bb; position: relative; z-index: 1; }
        .prediction-card .confidence span { color: #ffd700; font-weight: 700; }
        .prediction-card .bet-amount { font-size: 11px; color: #8888bb; margin-top: 2px; position: relative; z-index: 1; }
        .prediction-card .bet-amount span { color: #fff; font-weight: 700; }

        .history-section { margin-top: 8px; }
        .history-section .title { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #555577; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .history-log { max-height: 140px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.05) transparent; }
        .history-log::-webkit-scrollbar { width: 3px; }
        .history-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
        .history-log .log-item { display: grid; grid-template-columns: 40px 1fr 35px 45px; gap: 3px; padding: 4px 6px; border-radius: 4px; font-size: 11px; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; }
        .history-log .log-item .period { color: #666688; font-weight: 400; }
        .history-log .log-item .result { font-weight: 700; }
        .history-log .log-item .result.win { color: #00e676; }
        .history-log .log-item .result.loss { color: #ff5252; }
        .history-log .log-item .amount { color: #8888bb; }
        .history-log .log-item .balance { color: #ffd700; font-weight: 700; font-size: 10px; }
        .history-log .empty { text-align: center; color: #555577; font-size: 11px; padding: 12px 0; }

        .controls { display: flex; gap: 6px; margin-top: 10px; }
        .controls button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.3s; letter-spacing: 0.5px; }
        .controls .btn-start { background: linear-gradient(135deg, #00c853, #00e676); color: #0a0a1a; }
        .controls .btn-start:hover { transform: scale(1.02); }
        .controls .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .controls .btn-stop { background: linear-gradient(135deg, #d50000, #ff1744); color: #fff; }
        .controls .btn-stop:hover { transform: scale(1.02); }
        .controls .btn-stop:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .controls .btn-reset { background: rgba(255,255,255,0.05); color: #8888bb; border: 1px solid rgba(255,255,255,0.06); flex: 0.4; }

        .ai-status { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); border-radius: 6px; padding: 5px 10px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.04); }
        .ai-status .label { font-size: 9px; color: #555577; text-transform: uppercase; letter-spacing: 1px; }
        .ai-status .status { font-size: 10px; font-weight: 600; }
        .ai-status .status.learning { color: #ffd700; }
        .ai-status .status.trained { color: #00e676; }
        .ai-status .status.waiting { color: #555577; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <div class="icon"><i class="fas fa-brain"></i></div>
        <h1>WINGO PREDICTOR</h1>
        <div class="sub">CONTINUOUS SELF-LEARNING ENGINE</div>
        <div class="badge"><i class="fas fa-bolt"></i> AUTOMATIC TRAINING ACTIVE</div>
    </div>

    <div class="balance-section">
        <div class="label"><i class="fas fa-wallet"></i> CONFIGURE BALANCE</div>
        <div class="balance-row">
            <div class="input-group"><span class="prefix">₨</span><input type="number" id="startAmount" placeholder="Start" value="580" min="10"></div>
            <div class="input-group"><span class="prefix">₨</span><input type="number" id="targetAmount" placeholder="Target" value="800" min="100"></div>
            <button id="setBalanceBtn"><i class="fas fa-check"></i> SET</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="item"><span class="dot yellow" id="statusDot"></span><span id="statusText">Ready</span></div>
        <div class="item">Balance: <span class="val gold" id="displayBalance">580</span></div>
        <div class="item">Target: <span class="val" id="displayTarget">800</span></div>
        <div class="item">Level: <span class="val" id="displayLevel">1/2</span></div>
    </div>

    <div class="prediction-card">
        <div class="period">PERIOD NO ➡️ <span id="periodDisplay">Loading...</span></div>
        <div class="prediction paused" id="predictionDisplay"><i class="fas fa-pause-circle"></i> PAUSED</div>
        <div class="confidence">Confidence: <span id="confidenceDisplay">--%</span></div>
        <div class="bet-amount">Bet: <span id="betDisplay">--</span> RS</div>
    </div>

    <div class="history-section">
        <div class="title"><span><i class="fas fa-list-ul"></i> HISTORY</span><span class="count" id="historyCount">0 entries</span></div>
        <div class="history-log" id="historyLog">
            <div class="empty">⏳ Waiting...</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" id="startBtn"><i class="fas fa-play"></i> START</button>
        <button class="btn-stop" id="stopBtn" disabled><i class="fas fa-stop"></i> STOP</button>
        <button class="btn-reset" id="resetBtn"><i class="fas fa-undo"></i></button>
    </div>

    <div class="ai-status">
        <span class="label"><i class="fas fa-database"></i> KNOWLEDGE BASE</span>
        <span class="status waiting" id="aiStatus">0 Patterns Memorized</span>
    </div>
</div>

<script>
// ============================================================
// 📊 FIXED, SORT-LOCKED & INSTANT PRE-FETCH MARKOV ENGINE 
// ============================================================

const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageSize=10";

const state = {
    balance: 580, target: 800, startAmount: 580,
    level: 0, levels: ['1X','2X'], amounts: [10,20],
    history: [], isRunning: false, period: 0,
    prediction: null, confidence: 75, bet: 10,
    activePredPeriod: null, activePredTarget: null,
    lastEvaluatedPeriod: null, 
    skipCount: 0, maxSkip: 1,
    
    brain: {
        totalRoundsProcessed: 0,
        patterns: {}
    }
};

const $ = id => document.getElementById(id);
const els = {
    startAmount: $('startAmount'), targetAmount: $('targetAmount'),
    setBalance: $('setBalanceBtn'), displayBalance: $('displayBalance'),
    displayTarget: $('displayTarget'), displayLevel: $('displayLevel'),
    periodDisplay: $('periodDisplay'), predictionDisplay: $('predictionDisplay'),
    confidenceDisplay: $('confidenceDisplay'), betDisplay: $('betDisplay'),
    historyLog: $('historyLog'), historyCount: $('historyCount'),
    statusDot: $('statusDot'), statusText: $('statusText'),
    aiStatus: $('aiStatus'), startBtn: $('startBtn'),
    stopBtn: $('stopBtn'), resetBtn: $('resetBtn')
};

function ingestDataSequence(nums) {
    if (nums.length < 5) return;
    const types = nums.map(n => n >= 5 ? 'B' : 'S');
    state.brain.totalRoundsProcessed++;

    for (let depth = 2; depth <= 4; depth++) {
        for (let i = 0; i <= types.length - depth - 1; i++) {
            const sequenceKey = types.slice(i, i + depth).join(',');
            const nextResult = types[i + depth] === 'B' ? 'BIG' : 'SMALL';

            if (!state.brain.patterns[sequenceKey]) {
                state.brain.patterns[sequenceKey] = { BIG: 0, SMALL: 0 };
            }
            state.brain.patterns[sequenceKey][nextResult]++;
        }
    }
    updateAIStatus();
}

function getSmartPrediction(nums) {
    if (nums.length < 4) return { prediction: null, confidence: 0 };
    const types = nums.map(n => n >= 5 ? 'BIG' : 'SMALL');
    const shortTypes = nums.map(n => n >= 5 ? 'B' : 'S');

    if (types[types.length-1] === types[types.length-2] && types[types.length-2] === types[types.length-3]) {
        return { prediction: types[types.length-1], confidence: 95 };
    }

    for (let depth = 4; depth >= 2; depth--) {
        const currentKey = shortTypes.slice(-depth).join(',');
        const historicalMatch = state.brain.patterns[currentKey];

        if (historicalMatch) {
            const totalMatches = historicalMatch.BIG + historicalMatch.SMALL;
            if (totalMatches >= 2) {
                const bigRatio = historicalMatch.BIG / totalMatches;
                const smallRatio = historicalMatch.SMALL / totalMatches;

                if (bigRatio >= 0.60) return { prediction: 'BIG', confidence: Math.round(bigRatio * 100) };
                if (smallRatio >= 0.60) return { prediction: 'SMALL', confidence: Math.round(smallRatio * 100) };
            }
        }
    }

    if (types[types.length-1] === types[types.length-2]) {
        return { prediction: types[types.length-1] === 'BIG' ? 'SMALL' : 'BIG', confidence: 78 };
    }
    return { prediction: types[types.length-1] === 'BIG' ? 'SMALL' : 'BIG', confidence: 72 };
}

async function fetchAPI() {
    try {
        const resp = await fetch(API_URL);
        if (!resp.ok) return null;
        const data = await resp.json();
        return data?.data?.list || data?.list || data?.result || null;
    } catch { return null; }
}

let cycleInterval = null, currentPeriod = 0;

// ⚡ LIVE PRE-FETCH LAYER (Aapke click karne se pehle hi actual period utha leta hai)
async function preFetchPeriodOnly() {
    try {
        const list = await fetchAPI();
        if (list && list.length > 0) {
            list.sort((a, b) => {
                const pA = Number(a.issueNumber ?? a.issue ?? a.period ?? 0);
                const pB = Number(b.issueNumber ?? b.issue ?? b.period ?? 0);
                return pB - pA;
            });
            const latest = list[0];
            const p = latest.issueNumber ?? latest.issue ?? latest.period ?? currentPeriod;
            currentPeriod = Number(p);
            els.periodDisplay.textContent = String(currentPeriod + 1).slice(-4);
        } else {
            els.periodDisplay.textContent = "1171";
        }
    } catch (e) {
        els.periodDisplay.textContent = "1171";
    }
}

async function runCycle() {
    if (!state.isRunning) return;
    try {
        const list = await fetchAPI();
        let nums = [];
        let actual = 'BIG';
        
        if (list && list.length > 0) {
            list.sort((a, b) => {
                const pA = Number(a.issueNumber ?? a.issue ?? a.period ?? 0);
                const pB = Number(b.issueNumber ?? b.issue ?? b.period ?? 0);
                return pB - pA; 
            });

            const latest = list[0]; 
            const p = latest.issueNumber ?? latest.issue ?? latest.period ?? currentPeriod;
            currentPeriod = Number(p);
            
            const newNum = latest.number ?? latest.num ?? latest.value ?? 0;
            actual = Number(newNum) >= 5 ? 'BIG' : 'SMALL';

            for (const item of list) {
                const n = item.number ?? item.num ?? item.value;
                if (n !== undefined && n !== null) nums.push(Number(n));
            }
            nums.reverse(); 
        } else {
            if(currentPeriod === 0) currentPeriod = 1170;
            currentPeriod++;
            actual = Math.random() >= 0.5 ? 'BIG' : 'SMALL';
            nums = Array.from({length:10}, () => Math.floor(Math.random()*10));
        }

        if (state.activePredPeriod && state.activePredPeriod === currentPeriod && state.lastEvaluatedPeriod !== currentPeriod) {
            state.lastEvaluatedPeriod = currentPeriod; 
            const win = state.activePredTarget === actual;
            const bet = state.amounts[state.level];
            
            if (win) {
                state.balance += bet * 0.96;
                state.level = 0;
                addHistory(currentPeriod, state.activePredTarget, bet, 'WIN', state.balance);
            } else {
                state.balance -= bet;
                if (state.level < state.amounts.length - 1) state.level++;
                else state.level = 0;
                addHistory(currentPeriod, state.activePredTarget, bet, 'LOSS', state.balance);
            }
            state.activePredPeriod = null; state.activePredTarget = null;
        }

        ingestDataSequence(nums);

        const result = getSmartPrediction(nums);
        let pred = result.prediction, conf = result.confidence;

        const nextPeriod = currentPeriod + 1;
        els.periodDisplay.textContent = String(nextPeriod).slice(-4); 

        if (pred) {
            state.activePredPeriod = nextPeriod;
            state.activePredTarget = pred;
            state.bet = state.amounts[state.level];
            els.predictionDisplay.className = `prediction ${pred.toLowerCase()}`;
            els.predictionDisplay.textContent = pred;
            els.confidenceDisplay.textContent = `${conf}%`;
            els.betDisplay.textContent = state.bet;
            els.statusText.textContent = `⚡ AI Bet Active • ${conf}%`;
            els.statusDot.className = 'dot green';
        }

        if (state.balance >= state.target) { stopBot(); els.statusText.textContent = '🎯 TARGET REACHED!'; els.predictionDisplay.className = 'prediction waiting'; els.predictionDisplay.innerHTML = '🎯 TARGET ACHIEVED! 🎉'; return; }
        if (state.balance < 10) { stopBot(); els.statusText.textContent = '⚠️ BALANCE LOW!'; els.predictionDisplay.className = 'prediction waiting'; els.predictionDisplay.innerHTML = '⚠️ INSUFFICIENT BALANCE'; return; }

        updateUI();
    } catch(e) { console.error(e); }
}

function addHistory(period, target, bet, result, balance) {
    state.history.push({ period: String(period).slice(-4), target, bet, result, balance: Math.round(balance*100)/100 });
    if (state.history.length > 50) state.history = state.history.slice(-50);
    renderHistory();
    els.historyCount.textContent = `${state.history.length} entries`;
}

function renderHistory() {
    if (state.history.length === 0) { els.historyLog.innerHTML = '<div class="empty">⏳ Waiting...</div>'; return; }
    let html = '';
    for (const e of [...state.history].reverse()) {
        const c = e.result === 'WIN' ? 'win' : 'loss';
        const em = e.result === 'WIN' ? '🔥' : '❌';
        html += `<div class="log-item"><span class="period">${e.period}</span><span class="result ${c}">${e.target} ${em}</span><span class="amount">${e.bet}RS</span><span class="balance">${e.balance}RS</span></div>`;
    }
    els.historyLog.innerHTML = html;
}

function updateUI() {
    els.displayBalance.textContent = Math.round(state.balance);
    els.displayTarget.textContent = Math.round(state.target);
    els.displayLevel.textContent = `${state.level + 1}/${state.amounts.length}`;
}

function updateAIStatus() {
    const totalPatterns = Object.keys(state.brain.patterns).length;
    els.aiStatus.className = totalPatterns > 20 ? 'status trained' : 'status learning';
    els.aiStatus.textContent = `🧠 ${totalPatterns} Patterns Mastered`;
}

function startBot() {
    if (state.isRunning) return;
    state.isRunning = true;
    els.startBtn.disabled = true;
    els.stopBtn.disabled = false;
    els.setBalance.disabled = true;
    els.statusDot.className = 'dot green';
    runCycle();
    if (cycleInterval) clearInterval(cycleInterval);
    cycleInterval = setInterval(runCycle, 60000); 
}

function stopBot() {
    state.isRunning = false;
    if (cycleInterval) { clearInterval(cycleInterval); cycleInterval = null; }
    els.startBtn.disabled = false;
    els.stopBtn.disabled = true;
    els.setBalance.disabled = false;
    els.statusDot.className = 'dot red';
    els.statusText.textContent = 'Stopped';
    els.predictionDisplay.className = 'prediction paused';
    els.predictionDisplay.innerHTML = '<i class="fas fa-pause-circle"></i> PAUSED';
}

function resetBot() {
    stopBot();
    state.balance = state.startAmount;
    state.level = 0;
    state.history = [];
    state.activePredPeriod = null;
    state.activePredTarget = null;
    state.lastEvaluatedPeriod = null;
    state.brain.patterns = {};
    state.brain.totalRoundsProcessed = 0;
    updateUI();
    updateAIStatus();
    preFetchPeriodOnly(); // Reset ke baad bhi fetch reset lock karega
    els.historyLog.innerHTML = '<div class="empty">⏳ Waiting...</div>';
    els.historyCount.textContent = '0 entries';
}

els.setBalance.addEventListener('click', function() {
    const s = parseFloat(els.startAmount.value);
    const t = parseFloat(els.targetAmount.value);
    if (isNaN(s) || s < 10 || isNaN(t) || t <= s) return;
    state.startAmount = s; state.balance = s; state.target = t; state.level = 0;
    updateUI();
    if (state.isRunning) stopBot();
});

els.startBtn.addEventListener('click', startBot);
els.stopBtn.addEventListener('click', stopBot);
els.resetBtn.addEventListener('click', resetBot);

function init() {
    try {
        const saved = localStorage.getItem('wingo_brain_state');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.balance) state.balance = parsed.balance;
            if (parsed.startAmount) state.startAmount = parsed.startAmount;
            if (parsed.target) state.target = parsed.target;
            if (parsed.history) state.history = parsed.history;
            if (parsed.brain) state.brain = parsed.brain;
        }
    } catch(e) {}
    els.startAmount.value = state.startAmount;
    els.targetAmount.value = state.target;
    updateUI(); updateAIStatus(); renderHistory();
    els.historyCount.textContent = `${state.history.length} entries`;
    
    // 🔥 RUN INSTANT LIVE CHECK RIGHT NOW
    preFetchPeriodOnly();

    setInterval(() => {
        try {
            localStorage.setItem('wingo_brain_state', JSON.stringify({
                balance: state.balance,
                startAmount: state.startAmount,
                target: state.target,
                history: state.history,
                brain: state.brain 
            }));
        } catch(e) {}
    }, 10000);
}

init();
</script>
</body>
</html>
