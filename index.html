<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo Ultra-Predictor Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #06060f;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-image: radial-gradient(circle at top right, rgba(247,151,30,0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0,230,118,0.08), transparent 40%);
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(13,13,28,0.95);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 22px 20px;
            border: 1px solid rgba(255,215,0,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header .icon { font-size: 36px; background: linear-gradient(135deg, #ffd700, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,215,0,0.2)); }
        .header h1 { font-family: 'Orbitron', sans-serif; font-size: 19px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .header .sub { font-size: 10px; color: #718096; letter-spacing: 3px; margin-top: 2px; }
        .header .badge { display: inline-block; background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.2); padding: 3px 14px; border-radius: 20px; font-size: 9px; color: #00e676; margin-top: 6px; font-weight: 700; text-transform: uppercase; }

        .balance-section { background: rgba(255,255,255,0.02); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04); }
        .balance-section .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #a0aec0; font-weight: 600; }
        .balance-row { display: flex; gap: 8px; margin-top: 6px; }
        .balance-row .input-group { flex: 1; position: relative; }
        .balance-row .input-group .prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #ffd700; font-weight: 700; font-size: 13px; }
        .balance-row input { width: 100%; padding: 10px 10px 10px 30px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700; font-family: 'Rajdhani', sans-serif; outline: none; transition: 0.3s; }
        .balance-row input:focus { border-color: #ffd700; background: rgba(0,0,0,0.5); }
        .balance-row button { padding: 0 20px; background: linear-gradient(135deg, #ffd700, #ff8800); border: none; border-radius: 10px; color: #06060f; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .balance-row button:hover { transform: scale(1.02); filter: brightness(1.1); }

        .status-bar { display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); border-radius: 10px; padding: 8px 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .status-bar .item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a0aec0; }
        .status-bar .item .val { font-weight: 700; color: #fff; font-size: 13px; }
        .status-bar .item .val.gold { color: #ffd700; }
        .status-bar .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .status-bar .dot.green { background: #00e676; animation: pulse 1.2s infinite; }
        .status-bar .dot.red { background: #ff5252; }
        .status-bar .dot.yellow { background: #ffd700; animation: pulse 0.7s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .prediction-card { background: linear-gradient(145deg, rgba(255,215,0,0.04), rgba(0,0,0,0)); border-radius: 16px; padding: 18px 14px; border: 1px solid rgba(255,215,0,0.08); text-align: center; margin-bottom: 12px; position: relative; }
        .prediction-card .period { font-size: 12px; color: #a0aec0; letter-spacing: 1px; font-weight: 600; }
        .prediction-card .period span { color: #ffd700; font-weight: 700; font-family: 'Orbitron', sans-serif; }
        .prediction-card .prediction { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; margin: 6px 0; letter-spacing: 2px; }
        .prediction-card .prediction.big { color: #ff5252; text-shadow: 0 0 30px rgba(255,82,82,0.4); }
        .prediction-card .prediction.small { color: #00e676; text-shadow: 0 0 30px rgba(0,230,118,0.4); }
        .prediction-card .prediction.paused { color: #cbd5e0; font-size: 20px; color: #a0aec0; }
        .prediction-card .confidence { font-size: 13px; color: #718096; }
        .prediction-card .confidence span { color: #00e676; font-weight: 700; font-family: 'Orbitron', sans-serif; }
        .prediction-card .bet-amount { font-size: 12px; color: #a0aec0; margin-top: 3px; }
        .prediction-card .bet-amount span { color: #fff; font-weight: 700; }

        .history-section { margin-top: 10px; }
        .history-section .title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #4a5568; font-weight: 700; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .history-log { max-height: 180px; overflow-y: auto; scrollbar-width: thin; }
        .history-log::-webkit-scrollbar { width: 3px; }
        .history-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }
        .history-log .log-item { display: grid; grid-template-columns: 50px 1fr 50px 60px; padding: 6px 8px; border-radius: 6px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); align-items: center; }
        .history-log .log-item:nth-child(even) { background: rgba(255,255,255,0.01); }
        .history-log .log-item .period { color: #718096; font-family: 'Orbitron', sans-serif; }
        .history-log .log-item .result { font-weight: 700; }
        .history-log .log-item .result.win { color: #00e676; }
        .history-log .log-item .result.loss { color: #ff5252; }
        .history-log .log-item .amount { color: #a0aec0; }
        .history-log .log-item .balance { color: #ffd700; font-weight: 700; text-align: right; }
        .history-log .empty { text-align: center; color: #4a5568; font-size: 12px; padding: 20px 0; }

        .controls { display: flex; gap: 8px; margin-top: 14px; }
        .controls button { flex: 1; padding: 11px; border: none; border-radius: 10px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s; letter-spacing: 1px; text-transform: uppercase; }
        .controls .btn-start { background: linear-gradient(135deg, #00c853, #00e676); color: #06060f; box-shadow: 0 4px 15px rgba(0,230,118,0.2); }
        .controls .btn-start:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .controls .btn-stop { background: linear-gradient(135deg, #d50000, #ff1744); color: #fff; }
        .controls .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }
        .controls .btn-reset { background: rgba(255,255,255,0.04); color: #a0aec0; border: 1px solid rgba(255,255,255,0.05); flex: 0.3; }
        .controls .btn-reset:hover { background: rgba(255,255,255,0.08); color: #fff; }

        .ai-status { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); border-radius: 8px; padding: 6px 12px; margin-top: 12px; border: 1px solid rgba(255,215,0,0.05); }
        .ai-status .label { font-size: 9px; color: #718096; text-transform: uppercase; letter-spacing: 1.5px; }
        .ai-status .status { font-size: 11px; font-weight: 700; font-family: 'Orbitron', sans-serif; }
        .ai-status .status.learning { color: #ffd700; }
        .ai-status .status.trained { color: #00e676; text-shadow: 0 0 10px rgba(0,230,118,0.2); }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <div class="icon"><i class="fas fa-brain"></i></div>
        <h1>WINGO AI RADICAL</h1>
        <div class="sub">DEEP MARKOV PATTERN ENGINE</div>
        <div class="badge" id="engineMode"><i class="fas fa-microchip"></i> Booting Engine...</div>
    </div>

    <div class="balance-section">
        <div class="label"><i class="fas fa-wallet"></i> Wallet Matrix</div>
        <div class="balance-row">
            <div class="input-group"><span class="prefix">₨</span><input type="number" id="startAmount" value="580"></div>
            <div class="input-group"><span class="prefix">₨</span><input type="number" id="targetAmount" value="2000"></div>
            <button id="setBalanceBtn">SET</button>
        </div>
    </div>

    <div class="status-bar">
        <div class="item"><span class="dot red" id="statusDot"></span><span id="statusText">Offline</span></div>
        <div class="item">Bal: <span class="val gold" id="displayBalance">580</span></div>
        <div class="item">Trgt: <span class="val" id="displayTarget">2000</span></div>
        <div class="item">Level: <span class="val" id="displayLevel">1/2</span></div>
    </div>

    <div class="prediction-card">
        <div class="period">LIVE UPCOMING PERIOD ➡️ <span id="periodDisplay">----</span></div>
        <div class="prediction paused" id="predictionDisplay"><i class="fas fa-power-off"></i> STANDBY</div>
        <div class="confidence">Dynamic Accuracy: <span id="confidenceDisplay">0%</span></div>
        <div class="bet-amount">Smart Stake: <span id="betDisplay">0</span> RS</div>
    </div>

    <div class="history-section">
        <div class="title"><span><i class="fas fa-database"></i> INFINITE LOGS</span><span id="historyCount">0 entries</span></div>
        <div class="history-log" id="historyLog">
            <div class="empty">System idle. No data recorded yet.</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" id="startBtn">⚡ ENGAGE</button>
        <button class="btn-stop" id="stopBtn" disabled>🛑 HALT</button>
        <button class="btn-reset" id="resetBtn" title="Reset All Data"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="ai-status">
        <span class="label"><i class="fas fa-network-wired"></i> PATTERN MEMORY MATRIX</span>
        <span class="status learning" id="aiStatus">0 Patterns Mastered</span>
    </div>
</div>

<script>
// =========================================================================
// 🔥 PRE-FETCH, HIGH-FREQUENCY INFINITE LEARNING ENGINE (MARKOV DEPTH 6)
// =========================================================================

const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?pageSize=10";

const state = {
    balance: 580, target: 2000, startAmount: 580,
    level: 0, levels: ['1X','2X'], amounts: [10,20],
    history: [], isRunning: false,
    currentLivePeriod: 0, 
    activePredPeriod: null, activePredTarget: null,
    lastEvaluatedPeriod: null, 
    
    brain: {
        totalRoundsProcessed: 0,
        patterns: {} // Unlimited associative pattern depth array
    }
};

const $ = id => document.getElementById(id);
const els = {
    startAmount: $('startAmount'), targetAmount: $('targetAmount'),
    setBalance: $('setBalanceBtn'), displayBalance: $('displayBalance'),
    displayTarget: $('displayTarget'), displayLevel: $('displayLevel'),
    periodDisplay: $('periodDisplay'), predictionDisplay: $('predictionDisplay'),
    confidenceDisplay: $('confidenceDisplay'), betDisplay: $('betDisplay'),
    historyLog: $('historyLog'), historyCount: $('historyCount'),
    statusDot: $('statusDot'), statusText: $('statusText'),
    aiStatus: $('aiStatus'), startBtn: $('startBtn'),
    stopBtn: $('stopBtn'), resetBtn: $('resetBtn'),
    engineMode: $('engineMode')
};

// Deep Ingestion Mechanism (Unlimited scale logic)
function ingestDataSequence(nums) {
    if (nums.length < 7) return;
    const types = nums.map(n => n >= 5 ? 'B' : 'S');
    state.brain.totalRoundsProcessed++;

    // Deep scanning from level 2 up to 6 chain linkages
    for (let depth = 2; depth <= 6; depth++) {
        for (let i = 0; i <= types.length - depth - 1; i++) {
            const sequenceKey = types.slice(i, i + depth).join(',');
            const nextResult = types[i + depth] === 'B' ? 'BIG' : 'SMALL';

            if (!state.brain.patterns[sequenceKey]) {
                state.brain.patterns[sequenceKey] = { BIG: 0, SMALL: 0 };
            }
            state.brain.patterns[sequenceKey][nextResult]++;
        }
    }
    updateAIStatus();
}

// Advanced Probability Predictor targeting 90%-99% dynamic scale
function getSmartPrediction(nums) {
    if (nums.length < 6) return { prediction: 'BIG', confidence: 50 };
    const types = nums.map(n => n >= 5 ? 'BIG' : 'SMALL');
    const shortTypes = nums.map(n => n >= 5 ? 'B' : 'S');

    // 1. Extreme Streak Protection Rule
    if (types.slice(-4).every((v, i, a) => v === a[0])) {
        return { prediction: types[types.length - 1] === 'BIG' ? 'SMALL' : 'BIG', confidence: 91 };
    }

    // 2. Cascade Deep Scan (From Depth 6 down to 2)
    for (let depth = 6; depth >= 2; depth--) {
        const currentKey = shortTypes.slice(-depth).join(',');
        const match = state.brain.patterns[currentKey];

        if (match) {
            const totalMatches = match.BIG + match.SMALL;
            if (totalMatches >= 2) { 
                const bigRatio = match.BIG / totalMatches;
                const smallRatio = match.SMALL / totalMatches;

                // Scale up confidence dynamics based on pattern volume size
                const volumeBonus = Math.min(8, Math.floor(totalMatches / 5)); 
                
                if (bigRatio >= 0.55) {
                    let conf = Math.min(99, Math.round(bigRatio * 100) + volumeBonus);
                    return { prediction: 'BIG', confidence: conf };
                }
                if (smallRatio >= 0.55) {
                    let conf = Math.min(99, Math.round(smallRatio * 100) + volumeBonus);
                    return { prediction: 'SMALL', confidence: conf };
                }
            }
        }
    }

    // Fallback logic
    return { prediction: types[types.length - 1] === 'BIG' ? 'SMALL' : 'BIG', confidence: 74 };
}

async function fetchAPI() {
    try {
        const resp = await fetch(API_URL + "?t=" + new Date().getTime()); // Anti-cache lock
        if (!resp.ok) return null;
        const data = await resp.json();
        return data?.data?.list || data?.list || data?.result || null;
    } catch { return null; }
}

let syncInterval = null;

// ⚡ 100% ORIGINAL LIVE ENGINE POLLING
async function coreEngineSync() {
    try {
        const list = await fetchAPI();
        if (!list || list.length === 0) return;

        // Sort dynamically to lock exact real chronological structure
        list.sort((a, b) => {
            const pA = Number(a.issueNumber ?? a.issue ?? a.period ?? 0);
            const pB = Number(b.issueNumber ?? b.issue ?? b.period ?? 0);
            return pB - pA;
        });

        const latestServerItem = list[0];
        const serverPeriod = Number(latestServerItem.issueNumber ?? latestServerItem.issue ?? latestServerItem.period);
        
        // Agar period change nahi hua, toh return ho jao (Anti-Duplicate Guard)
        if (serverPeriod === state.currentLivePeriod && state.lastEvaluatedPeriod === serverPeriod) {
            return; 
        }

        const newNum = latestServerItem.number ?? latestServerItem.num ?? latestServerItem.value ?? 0;
        const actualResult = Number(newNum) >= 5 ? 'BIG' : 'SMALL';

        // Jab pehli baar load ho ya sach mein naya period aa jaye
        const isNewPeriodDetected = state.currentLivePeriod !== 0 && serverPeriod > state.currentLivePeriod;
        state.currentLivePeriod = serverPeriod;

        // UI Par hamesha aane wala accurate period show hoga
        const nextUpcomingPeriod = state.currentLivePeriod + 1;
        els.periodDisplay.textContent = String(nextUpcomingPeriod);

        // 1. Evaluate previous bets safely if state is running
        if (state.isRunning && state.activePredPeriod && state.activePredPeriod === state.currentLivePeriod && state.lastEvaluatedPeriod !== state.currentLivePeriod) {
            state.lastEvaluatedPeriod = state.currentLivePeriod;
            const win = state.activePredTarget === actualResult;
            const bet = state.amounts[state.level];

            if (win) {
                state.balance += bet * 0.96;
                state.level = 0;
                addInfiniteHistory(state.currentLivePeriod, state.activePredTarget, bet, 'WIN', state.balance);
            } else {
                state.balance -= bet;
                if (state.level < state.amounts.length - 1) state.level++;
                else state.level = 0;
                addInfiniteHistory(state.currentLivePeriod, state.activePredTarget, bet, 'LOSS', state.balance);
            }
            state.activePredPeriod = null; state.activePredTarget = null;
        }

        // 2. Parse numbers dataset safely for deep learning ingestion
        let nums = [];
        for (const item of list) {
            const n = item.number ?? item.num ?? item.value;
            if (n !== undefined && n !== null) nums.push(Number(n));
        }
        nums.reverse(); // Reverse sequence to balance old-to-new layout

        ingestDataSequence(nums);

        // 3. Trigger next prediction execution block if bot is engaged
        if (state.isRunning) {
            const analysis = getSmartPrediction(nums);
            state.activePredPeriod = nextUpcomingPeriod;
            state.activePredTarget = analysis.prediction;
            state.bet = state.amounts[state.level];

            els.predictionDisplay.className = `prediction ${analysis.prediction.toLowerCase()}`;
            els.predictionDisplay.textContent = analysis.prediction;
            els.confidenceDisplay.textContent = `${analysis.confidence}%`;
            els.betDisplay.textContent = state.bet;
            
            els.statusText.textContent = `Live Analysis Running`;
            els.statusDot.className = 'dot green';

            // Checking boundaries thresholds
            if (state.balance >= state.target) { ceaseBot(); els.statusText.textContent = 'Target Met!'; els.predictionDisplay.className = 'prediction paused'; els.predictionDisplay.textContent = 'TARGET ACHIEVED 🎉'; return; }
            if (state.balance < 10) { ceaseBot(); els.statusText.textContent = 'Low Balance!'; els.predictionDisplay.className = 'prediction paused'; els.predictionDisplay.textContent = 'INSUFFICIENT FUNDS'; return; }
        }

        updateUI();
    } catch (e) { console.error("Sync Engine Error: ", e); }
}

function addInfiniteHistory(period, target, bet, result, balance) {
    // Zero truncation: Cap removed completely for unlimited data analytics mapping
    state.history.push({ period: String(period), target, bet, result, balance: Math.round(balance*100)/100 });
    renderHistory();
}

function renderHistory() {
    if (state.history.length === 0) { els.historyLog.innerHTML = '<div class="empty">System idle. No data recorded yet.</div>'; return; }
    let html = '';
    for (const e of [...state.history].reverse()) {
        const statusClass = e.result === 'WIN' ? 'win' : 'loss';
        const icon = e.result === 'WIN' ? '🔥' : '❌';
        html += `<div class="log-item"><span class="period">${e.period.slice(-4)}</span><span class="result ${statusClass}">${e.target} ${icon}</span><span class="amount">${e.bet}RS</span><span class="balance">${e.balance}RS</span></div>`;
    }
    els.historyLog.innerHTML = html;
    els.historyCount.textContent = `${state.history.length} entries`;
}

function updateUI() {
    els.displayBalance.textContent = Math.round(state.balance);
    els.displayTarget.textContent = Math.round(state.target);
    els.displayLevel.textContent = `${state.level + 1}/${state.amounts.length}`;
}

function updateAIStatus() {
    const totalPatterns = Object.keys(state.brain.patterns).length;
    if(totalPatterns > 150) {
        els.engineMode.className = "badge trained";
        els.engineMode.innerHTML = `<i class="fas fa-brain"></i> HIGH-ACCURACY MODE ACTIVE`;
    } else {
        els.engineMode.className = "badge";
        els.engineMode.innerHTML = `<i class="fas fa-microchip"></i> LEARNING DATA CHANNELS...`;
    }
    els.aiStatus.textContent = `${totalPatterns} Patterns Mastered`;
}

function engageBot() {
    if (state.isRunning) return;
    state.isRunning = true;
    els.startBtn.disabled = true;
    els.stopBtn.disabled = false;
    els.setBalance.disabled = true;
    els.statusDot.className = 'dot green';
    els.statusText.textContent = 'Live Syncing...';
    coreEngineSync();
}

function ceaseBot() {
    state.isRunning = false;
    els.startBtn.disabled = false;
    els.stopBtn.disabled = true;
    els.setBalance.disabled = false;
    els.statusDot.className = 'dot red';
    els.statusText.textContent = 'Halted';
    els.predictionDisplay.className = 'prediction paused';
    els.predictionDisplay.innerHTML = '<i class="fas fa-pause-circle"></i> PAUSED';
}

function wipeResetCore() {
    if(confirm("Kya aap poora network data aur history clear karna chahte hain?")) {
        ceaseBot();
        localStorage.removeItem('wingo_ultra_matrix_state');
        state.balance = state.startAmount;
        state.level = 0;
        state.history = [];
        state.activePredPeriod = null;
        state.activePredTarget = null;
        state.lastEvaluatedPeriod = null;
        state.brain.patterns = {};
        state.brain.totalRoundsProcessed = 0;
        state.currentLivePeriod = 0;
        updateUI();
        updateAIStatus();
        els.historyLog.innerHTML = '<div class="empty">System idle. No data recorded yet.</div>';
        els.historyCount.textContent = '0 entries';
        els.periodDisplay.textContent = "----";
        coreEngineSync();
    }
}

els.setBalance.addEventListener('click', function() {
    const s = parseFloat(els.startAmount.value);
    const t = parseFloat(els.targetAmount.value);
    if (isNaN(s) || s < 10 || isNaN(t) || t <= s) return;
    state.startAmount = s; state.balance = s; state.target = t; state.level = 0;
    updateUI();
    if (state.isRunning) ceaseBot();
});

els.startBtn.addEventListener('click', engageBot);
els.stopBtn.addEventListener('click', ceaseBot);
els.resetBtn.addEventListener('click', wipeResetCore);

function init() {
    try {
        const saved = localStorage.getItem('wingo_ultra_matrix_state');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.balance) state.balance = parsed.balance;
            if (parsed.startAmount) state.startAmount = parsed.startAmount;
            if (parsed.target) state.target = parsed.target;
            if (parsed.history) state.history = parsed.history;
            if (parsed.brain) state.brain = parsed.brain;
        }
    } catch(e) { console.error("Data restoration failed: ", e); }
    
    els.startAmount.value = state.startAmount;
    els.targetAmount.value = state.target;
    updateUI(); updateAIStatus(); renderHistory();
    
    // 🔥 LIVE HIGH FREQUENCY BACKGROUND COUPLING (Every 5 seconds check)
    coreEngineSync();
    syncInterval = setInterval(coreEngineSync, 5000);

    // Auto backup loop to secure infinite dataset configurations
    setInterval(() => {
        try {
            localStorage.setItem('wingo_ultra_matrix_state', JSON.stringify({
                balance: state.balance,
                startAmount: state.startAmount,
                target: state.target,
                history: state.history,
                brain: state.brain 
            }));
        } catch(e) {}
    }, 7000);
}

init();
</script>
</body>
</html>
